name: Data Validation

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate JSON datasets
        run: python scripts/validate_data.py
