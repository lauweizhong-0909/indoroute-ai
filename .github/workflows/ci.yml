name: CI Pipeline
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r apps/api/requirements.txt
          pip install pytest
      - name: Run Tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/apps/api
          pytest